<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Enmascarados | Postulación Moderador</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="staff-corner">
        <button id="staffLoginBtn" class="staff-btn" title="Acceso Staff">
            <span class="staff-icon">🛡️</span>
            <span class="staff-text">Staff</span>
        </button>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="mask-icon">🎭</div>
                <h1>Los Enmascarados</h1>
            </div>
            <p class="subtitle">Postulación para Moderador</p>
            <p class="header-description">Completa el formulario para postularte como moderador.</p>
        </header>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-steps">
                <div class="step active" data-step="1">1</div>
                <div class="step" data-step="2">2</div>
                <div class="step" data-step="3">3</div>
                <div class="step" data-step="4">4</div>
            </div>
        </div>

        <main class="main-content">
            <form id="postulacionForm" class="application-form" novalidate>
                
                <!-- SECCIÓN 1 -->
                <div class="form-section active" data-section="1">
                    <div class="section-header">
                        <span class="section-number">01</span>
                        <h2>Información Personal</h2>
                    </div>
                    
                    <div class="form-group">
                        <label for="discordNick">👤 Nick de Discord *</label>
                        <input type="text" id="discordNick" placeholder="Ejemplo: Usuario#1234" required>
                    </div>

                    <div class="form-group">
                        <label for="discordId">🆔 ID de Discord *</label>
                        <input type="text" id="discordId" placeholder="123456789012345678" required>
                        <span class="helper-text">Activa modo desarrollador en Discord</span>
                    </div>

                    <div class="form-group">
                        <label for="age">🎂 Edad *</label>
                        <input type="number" id="age" min="13" max="99" placeholder="Tu edad" required>
                    </div>

                    <div class="form-group">
                        <label for="timezone">🌍 Zona Horaria *</label>
                        <select id="timezone" required>
                            <option value="">Selecciona...</option>
                            <option value="GMT-6">GMT-6 (México, Centro)</option>
                            <option value="GMT-5">GMT-5 (Colombia, Perú)</option>
                            <option value="GMT-4">GMT-4 (Chile, Venezuela)</option>
                            <option value="GMT-3">GMT-3 (Argentina, Brasil)</option>
                            <option value="GMT+1">GMT+1 (España)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="languages">🗣️ Idiomas que hablas *</label>
                        <input type="text" id="languages" placeholder="Español (nativo), Inglés (intermedio)" required>
                    </div>
                </div>

                <!-- SECCIÓN 2 -->
                <div class="form-section" data-section="2">
                    <div class="section-header">
                        <span class="section-number">02</span>
                        <h2>Experiencia como Moderador</h2>
                    </div>

                    <div class="form-group">
                        <label>🛡️ ¿Tienes experiencia previa? *</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="hasExperience" value="si" required> Sí
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="hasExperience" value="no"> No
                            </label>
                        </div>
                    </div>

                    <div class="form-group" id="experienceDetails" style="display:none;">
                        <label for="experienceDescription">📝 Describe tu experiencia *</label>
                        <textarea id="experienceDescription" rows="5" placeholder="Servidores, tiempo, responsabilidades..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="availability">⏰ Disponibilidad diaria *</label>
                        <select id="availability" required>
                            <option value="">Selecciona...</option>
                            <option value="1-2 horas">1-2 horas</option>
                            <option value="2-4 horas">2-4 horas</option>
                            <option value="4-6 horas">4-6 horas</option>
                            <option value="6+ horas">Más de 6 horas</option>
                        </select>
                    </div>
                </div>

                <!-- SECCIÓN 3 -->
                <div class="form-section" data-section="3">
                    <div class="section-header">
                        <span class="section-number">03</span>
                        <h2>Escenarios</h2>
                    </div>

                    <div class="form-group">
                        <label for="scenario1">💭 Escenario: Un miembro insulta a otro. ¿Qué harías? *</label>
                        <textarea id="scenario1" rows="4" required placeholder="Describe tu respuesta..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="scenario2">💭 Escenario: Llega spam/raid al servidor. ¿Qué harías? *</label>
                        <textarea id="scenario2" rows="4" required placeholder="Describe tu respuesta..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>📜 ¿Conoces las reglas de Discord? *</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="discordRules" value="si" required> Sí</label>
                            <label class="radio-label"><input type="radio" name="discordRules" value="no"> No mucho</label>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 4 -->
                <div class="form-section" data-section="4">
                    <div class="section-header">
                        <span class="section-number">04</span>
                        <h2>Sobre Ti</h2>
                    </div>

                    <div class="form-group">
                        <label for="motivation">💪 ¿Por qué quieres ser moderador? *</label>
                        <textarea id="motivation" rows="4" required placeholder="Tus motivaciones..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="strengths">⭐ Fortalezas *</label>
                        <textarea id="strengths" rows="3" required placeholder="Paciencia, comunicación..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="weaknesses">🌱 Áreas de mejora</label>
                        <textarea id="weaknesses" rows="3" placeholder="Sé honesto..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label terms">
                            <input type="checkbox" id="termsAccepted" required>
                            Acepto que mis datos sean revisados por <strong>Los Enmascarados</strong> *
                        </label>
                    </div>
                </div>

                <!-- BOTONES -->
                <div class="form-navigation">
                    <button type="button" class="nav-btn prev-btn" id="prevBtn" style="display:none;">← Anterior</button>
                    <button type="button" class="nav-btn next-btn" id="nextBtn">Siguiente →</button>
                    <button type="submit" class="submit-btn" id="submitBtn" style="display:none;">
                        Enviar Postulación 📤
                    </button>
                </div>

                <div id="messageContainer" class="message-container hidden"></div>
            </form>
        </main>

        <footer class="footer">
            <p>© 2024 Los Enmascarados</p>
        </footer>
    </div>

</body>
</html>
