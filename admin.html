<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Los Enmascarados</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .card { background: #16213e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #6c3ce0; }
        .card h3 { margin: 0 0 5px 0; color: #a78bfa; }
        .card small { color: #888; }
        .badge { background: #6c3ce0; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }
        .actions button { margin: 5px; padding: 5px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .accept { background: #4ade80; color: black; }
        .reject { background: #f87171; color: black; }
        .loading { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>
    <h1>🛡️ Panel de Moderación</h1>
    <div id="loading" class="loading">Cargando postulaciones...</div>
    <div id="lista"></div>

    <script>
        // CONFIGURACIÓN
        const SUPABASE_URL = 'https://tusubdominio.supabase.co';  // <-- PON TU URL
        const SUPABASE_ANON_KEY = 'tu-clave-anon';               // <-- PON TU CLAVE

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function cargarPostulaciones() {
            const { data, error } = await supabase
                .from('postulaciones')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('lista').innerHTML = '❌ Error al cargar: ' + error.message;
                return;
            }

            document.getElementById('loading').style.display = 'none';
            const lista = document.getElementById('lista');
            lista.innerHTML = '';

            if (data.length === 0) {
                lista.innerHTML = '<p style="color:#888;">No hay postulaciones aún.</p>';
                return;
            }

            data.forEach((p) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${p.discord_nick} <span class="badge">${p.status}</span></h3>
                    <p><strong>Edad:</strong> ${p.age} | <strong>Zona:</strong> ${p.timezone}</p>
                    <p><strong>Disponibilidad:</strong> ${p.availability}</p>
                    <p><strong>Motivación:</strong> ${p.motivation}</p>
                    <p><small>ID: ${p.discord_id} | ${new Date(p.created_at).toLocaleString()}</small></p>
                    <div class="actions">
                        <button class="accept" onclick="cambiarEstado(${p.id}, 'aceptado')">✅ Aceptar</button>
                        <button class="reject" onclick="cambiarEstado(${p.id}, 'rechazado')">❌ Rechazar</button>
                        <button onclick="verDetalle(${p.id})">📄 Ver más</button>
                    </div>
                `;
                lista.appendChild(card);
            });
        }

        async function cambiarEstado(id, nuevoEstado) {
            const { error } = await supabase
                .from('postulaciones')
                .update({ status: nuevoEstado })
                .eq('id', id);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('✅ Estado actualizado a ' + nuevoEstado);
                cargarPostulaciones(); // Recargar lista
            }
        }

        function verDetalle(id) {
            alert('Función para mostrar detalles completos (puedes expandirla)');
        }

        // Cargar al abrir
        cargarPostulaciones();

        // Actualizar cada 10 segundos (tiempo real)
        setInterval(cargarPostulaciones, 10000);
    </script>
</body>
</html>
